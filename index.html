<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Untuk Humai 🤍</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* KUNCI LAYAR AGAR TIDAK BISA DI-SCROLL SAMA SEKALI */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden !important;
            position: fixed;
            top: 0;
            left: 0;
            touch-action: none; /* Mencegah efek swipe/scroll di layar sentuh */
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fce4ec, #f3e5f5, #fff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Bokeh & Particles */
        .bokeh {
            position: absolute;
            border-radius: 50%;
            filter: blur(20px);
            opacity: 0.4;
            animation: floatBokeh 10s infinite alternate ease-in-out;
            pointer-events: none;
        }

        @keyframes floatBokeh {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -50px) scale(1.2); }
        }

        .particle {
            position: absolute;
            bottom: -20px;
            pointer-events: none;
            animation: floatUp linear forwards;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        /* Lyric Animations */
        .lyric-text {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.5s ease-in-out, transform 1.5s ease-out;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.8);
            position: absolute;
            width: 100%;
            text-align: center;
            padding: 0 1.5rem;
            box-sizing: border-box;
            pointer-events: none;
        }

        .lyric-text.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Container Pesan Final & Tombol Musik (Di Tengah Layar) */
        #final-container {
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 3s ease-in-out, transform 3s ease-in-out;
            pointer-events: none; /* Awalnya tidak bisa diklik */
        }

        #final-container.show {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto; /* Tombol di dalamnya jadi bisa diklik */
        }

        .final-message {
            font-family: 'Dancing Script', cursive;
            text-shadow: 0 0 15px rgba(255, 182, 193, 0.8), 0 0 5px rgba(255, 255, 255, 0.8);
        }

        /* Gemoy Sticker Animation (Panda) */
        .panda-head {
            animation: gentleNod 3s ease-in-out infinite alternate;
            transform-origin: 100px 100px;
        }

        .panda-arm-right {
            animation: wave 2s ease-in-out infinite alternate;
            transform-origin: 135px 145px; /* Titik poros lengan kanan diperbaiki */
        }
        
        .heart-beat {
            animation: heartbeat 1.2s infinite ease-in-out;
            transform-origin: 100px 125px; 
        }

        @keyframes gentleNod {
            0% { transform: rotate(-3deg); }
            100% { transform: rotate(3deg); }
        }

        @keyframes wave {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-20deg); }
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
        }

        /* Play Screen */
        #start-screen {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.4);
            transition: opacity 1s ease-out;
        }
    </style>
</head>
<body class="text-gray-800">

    <!-- Audio Element (Sesuai source aslimu) -->
    <audio id="bgm" loop>
        <source src="ssstik.io_1780696379226.mp3" type="audio/mpeg">
    </audio>

    <!-- Bokeh Background Effects -->
    <div class="bokeh bg-pink-300 w-48 h-48 md:w-64 md:h-64 top-10 left-4 md:left-10"></div>
    <div class="bokeh bg-purple-300 w-64 h-64 md:w-80 md:h-80 bottom-20 right-4 md:right-10" style="animation-delay: -5s;"></div>
    <div class="bokeh bg-white w-32 h-32 md:w-48 md:h-48 top-1/3 left-1/3" style="animation-delay: -2s;"></div>

    <!-- Particles Container -->
    <div id="particles" class="absolute inset-0 overflow-hidden pointer-events-none z-0"></div>

    <!-- Cute Panda SVG Sticker (Perbaikan Tangan Copot!) -->
    <div class="absolute bottom-6 right-2 w-28 h-28 md:bottom-10 md:right-10 md:w-36 md:h-36 opacity-95 z-10 hidden" id="gemoy-sticker">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" class="w-full h-full drop-shadow-lg">
            <g class="panda-head">
                <!-- Ears -->
                <circle cx="50" cy="60" r="25" fill="#2d3436" />
                <circle cx="150" cy="60" r="25" fill="#2d3436" />
                <!-- Head -->
                <ellipse cx="100" cy="100" rx="70" ry="60" fill="#ffffff" />
                <!-- Eyes -->
                <ellipse cx="65" cy="95" rx="15" ry="20" fill="#2d3436" transform="rotate(20 65 95)"/>
                <ellipse cx="135" cy="95" rx="15" ry="20" fill="#2d3436" transform="rotate(-20 135 95)"/>
                <!-- Eye sparks -->
                <circle cx="60" cy="90" r="5" fill="#ffffff" />
                <circle cx="130" cy="90" r="5" fill="#ffffff" />
                <!-- Nose -->
                <ellipse cx="100" cy="115" rx="8" ry="5" fill="#2d3436" />
                <!-- Mouth -->
                <path d="M 90 125 Q 100 135 110 125" fill="none" stroke="#2d3436" stroke-width="3" stroke-linecap="round"/>
                <!-- Blush -->
                <ellipse cx="50" cy="115" rx="12" ry="6" fill="#ff7675" opacity="0.6" />
                <ellipse cx="150" cy="115" rx="12" ry="6" fill="#ff7675" opacity="0.6" />
            </g>
            <!-- Body -->
            <ellipse cx="100" cy="170" rx="55" ry="45" fill="#ffffff" />
            <!-- Arms (Tangan Panda Dimasukkan Sedikit Ke Dalam Badan Agar Menempel) -->
            <!-- Lengan Kiri -->
            <path d="M 65 145 Q 40 160 55 185" fill="none" stroke="#2d3436" stroke-width="14" stroke-linecap="round" />
            <!-- Lengan Kanan Melambai (Sudah Tidak Copot Lagi) -->
            <g class="panda-arm-right">
                <path d="M 135 145 Q 160 160 145 185" fill="none" stroke="#2d3436" stroke-width="14" stroke-linecap="round" />
            </g>
            <!-- Perfect Heart in hand -->
            <path d="M100,150 C100,150 75,125 75,110 C75,95 95,95 100,110 C105,95 125,95 125,110 C125,125 100,150 100,150 Z" fill="#ff4757" class="heart-beat"/>
        </svg>
    </div>

    <!-- Area Konten Utama -->
    <div class="absolute inset-0 z-10 w-full flex flex-col items-center justify-center pointer-events-none">
        
        <!-- Lirik Lagu -->
        <div id="lyrics-box" class="relative w-full h-40 flex items-center justify-center text-2xl sm:text-3xl md:text-4xl lg:text-5xl font-medium text-gray-800 -mt-20">
            <div id="lyric-0" class="lyric-text">Ungkapkan apa yang kurasa</div>
            <div id="lyric-1" class="lyric-text leading-tight">
                Di hatiku tertulis namamu<br>
                <span class="text-xl sm:text-2xl md:text-3xl text-pink-600 mt-2 block font-semibold">(Denisya Aufa Khairan / Humairah)</span>
            </div>
            <div id="lyric-2" class="lyric-text">Serta di setiap langkahku</div>
            <div id="lyric-3" class="lyric-text">Semua kasihku hanya untukmu</div>
            <div id="lyric-4" class="lyric-text">Izinkan aku bersamamu</div>
        </div>

    </div>

    <!-- Container Pesan Final & Tombol Pause (Tengah Layar) -->
    <div id="final-container" class="absolute inset-0 flex flex-col items-center justify-center z-20 pb-10">
        <!-- Teks Final -->
        <div class="final-message text-4xl sm:text-5xl md:text-6xl lg:text-7xl text-pink-700 text-center leading-snug md:leading-normal px-4">
            Humai, jangan tinggalkan mas,<br>mas mohon... 🥺🤍
        </div>
        
        <!-- Tombol Musik (Dipindah ke Bawah Teks Persis) -->
        <button id="music-btn" class="mt-8 px-6 py-3 bg-white/80 backdrop-blur-md border-2 border-pink-300 rounded-full text-pink-600 font-bold hover:bg-pink-100 transition-colors shadow-[0_0_15px_rgba(244,114,182,0.5)] flex items-center justify-center gap-2 text-sm md:text-base outline-none cursor-pointer">
            ⏸️ Jeda Lagu
        </button>
    </div>

    <!-- Start Screen Overlay -->
    <div id="start-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center pointer-events-auto">
        <h1 class="text-4xl md:text-5xl font-bold text-pink-600 mb-8 font-['Dancing_Script'] drop-shadow-md text-center px-4 leading-tight">Ada pesan untukmu...</h1>
        <button id="play-btn" class="group relative px-8 py-3 bg-white/80 border-2 border-pink-300 rounded-full text-pink-600 font-semibold text-base md:text-lg hover:bg-pink-50 hover:text-pink-700 transition-all duration-300 shadow-[0_0_20px_rgba(244,114,182,0.4)] hover:shadow-[0_0_30px_rgba(244,114,182,0.6)] transform hover:scale-105 outline-none cursor-pointer">
            Buka Pesan 💌
            <span class="absolute inset-0 rounded-full border-2 border-pink-400 animate-ping opacity-20 pointer-events-none"></span>
        </button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const startScreen = document.getElementById('start-screen');
            const playBtn = document.getElementById('play-btn');
            const audio = document.getElementById('bgm');
            const finalContainer = document.getElementById('final-container');
            const musicBtn = document.getElementById('music-btn');
            const gemoySticker = document.getElementById('gemoy-sticker');
            const particlesContainer = document.getElementById('particles');

            let isPlaying = true;

            // Data Timing Lirik (dalam milidetik)
            const timings = [
                { id: 'lyric-0', show: 0, hide: 3700 },          
                { id: 'lyric-1', show: 4300, hide: 8100 },       
                { id: 'lyric-2', show: 8200, hide: 11400 },      
                { id: 'lyric-3', show: 11400, hide: 14900 },     
                { id: 'lyric-4', show: 14900, hide: 18500 }      
            ];
            
            const finalMessageTime = 19500;

            // Fungsi Partikel
            function createParticle() {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                const isHeart = Math.random() > 0.3;
                if(isHeart) {
                    particle.innerHTML = '🤍';
                    const baseSize = window.innerWidth < 768 ? 8 : 12;
                    particle.style.fontSize = Math.random() * 8 + baseSize + 'px';
                    particle.style.color = Math.random() > 0.5 ? '#fbcfe8' : '#ffffff';
                } else {
                    particle.innerHTML = '✨';
                    particle.style.fontSize = Math.random() * 8 + 8 + 'px';
                }

                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.animationDuration = Math.random() * 5 + 6 + 's';
                
                particlesContainer.appendChild(particle);

                setTimeout(() => {
                    particle.remove();
                }, 11000);
            }

            // Memulai pengalaman
            playBtn.addEventListener('click', () => {
                startScreen.style.opacity = '0';
                setTimeout(() => {
                    startScreen.style.display = 'none';
                }, 1000);

                audio.volume = 0.5;
                let audioPromise = audio.play();
                if (audioPromise !== undefined) {
                    audioPromise.catch(error => {
                        console.log("Autoplay dicegah.");
                    });
                }

                gemoySticker.classList.remove('hidden');

                const particleInterval = window.innerWidth < 768 ? 600 : 400; 
                setInterval(createParticle, particleInterval);

                timings.forEach(lyric => {
                    const el = document.getElementById(lyric.id);
                    setTimeout(() => { el.classList.add('show'); }, lyric.show);
                    setTimeout(() => { el.classList.remove('show'); }, lyric.hide);
                });

                // Tampilkan Container Akhir (Berisi Teks & Tombol)
                setTimeout(() => {
                    finalContainer.classList.add('show');
                }, finalMessageTime);
            });

            // Logika Tombol Play/Pause
            musicBtn.addEventListener('click', () => {
                if (isPlaying) {
                    audio.pause();
                    musicBtn.innerHTML = '▶️ Putar Lagu';
                } else {
                    audio.play();
                    musicBtn.innerHTML = '⏸️ Jeda Lagu';
                }
                isPlaying = !isPlaying;
            });
        });
    </script>
</body>
</html>
